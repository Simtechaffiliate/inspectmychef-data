name: Refresh Charlotte data

on:
  schedule:
    # Mondays at 08:00 UTC (03:00 EST, 04:00 EDT)
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: playwright install --with-deps chromium

      - name: Scrape CDPEHS
        env:
          HEADLESS: '1'
          PYTHONUNBUFFERED: '1'
          MAX_PAGES: '15'
        run: python scraper.py

      - name: Geocode addresses
        env:
          PYTHONUNBUFFERED: '1'
        run: python geocode_only.py

      - name: Commit refreshed data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/charlotte-mecklenburg.json output/geocode-cache.json
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          git commit -m "chore: refresh Charlotte/Mecklenburg snapshot $(date -u +%Y-%m-%d)"
          git push
